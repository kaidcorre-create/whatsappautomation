name = "whatsapp-daily-update"
main = "worker.js"
compatibility_date = "2025-01-01"

[triggers]
crons = ["0 9 * * *"]  # daily 09:00 UTC — adjust to your preferred time

[[d1_databases]]
binding = "DB"
database_name = "ysa-temple-booking"
database_id = "84b486fd-d33c-4b6d-ba46-bf9d70cea679"

# Secrets set via `wrangler secret put`:
#   GREENAPI_ID          your instance ID
#   GREENAPI_TOKEN       your instance API token
#   WHATSAPP_GROUP_ID    e.g. 120363426993385382@g.us
#   MANUAL_TRIGGER_KEY   any random string for /run and /test and /chats
